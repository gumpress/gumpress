# =================================================
# 1. GLOBAL SETTINGS (Core Directives)
# =================================================

ServerRoot @SRVROOT@
PidFile @PIDFILE@
Listen 127.0.0.1:@LISTEN-PORT@
Listen [::1]:@LISTEN-PORT@
ServerAdmin admin@example.com
ServerName @SERVER-NAME@
DocumentRoot @DOCUMENT-ROOT-1@
Timeout 333
LogLevel warn

# =================================================
# 2. DYNAMIC MODULES (LoadModule)
# =================================================

LoadModule alias_module modules/mod_alias.so
LoadModule auth_basic_module modules/mod_auth_basic.so
LoadModule authn_core_module modules/mod_authn_core.so
LoadModule authn_file_module modules/mod_authn_file.so
LoadModule authz_core_module modules/mod_authz_core.so
LoadModule authz_host_module modules/mod_authz_host.so
LoadModule authz_user_module modules/mod_authz_user.so
LoadModule dir_module modules/mod_dir.so
LoadModule env_module modules/mod_env.so
LoadModule headers_module modules/mod_headers.so
LoadModule log_config_module modules/mod_log_config.so
LoadModule mime_module modules/mod_mime.so
LoadModule rewrite_module modules/mod_rewrite.so
LoadModule setenvif_module modules/mod_setenvif.so
LoadModule ssl_module modules/mod_ssl.so
LoadModule php_module @PHP-MODULE@
LoadModule proxy_module modules/mod_proxy.so
LoadModule proxy_http_module modules/mod_proxy_http.so

# =================================================
# 3. MODULE CONFIGURATIONS (Conditional Blocks)
# =================================================

# PHP Handler Configuration
<IfModule php_module>
	AddHandler application/x-httpd-php .php
	AddType application/x-httpd-php .php .html0
	PHPIniDir @PHPINIDIR@
</IfModule>

# Directory Index Files
<IfModule dir_module>
	DirectoryIndex index.php index.html
</IfModule>

# Logging Configuration
<IfModule log_config_module>
	LogFormat "%h %l %u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\"" combined
	LogFormat "%h %l %u %t \"%r\" %>s %b" common
	CustomLog @CUSTOMLOG@ common
	ErrorLog @ERRORLOG@
</IfModule>

# MIME Types and Compression
<IfModule mime_module>
	TypesConfig conf/mime.types
	AddType application/x-compress .Z
	AddType application/x-gzip .gz .tgz
</IfModule>

# SSL Engine Seeds
<IfModule ssl_module>
	SSLRandomSeed startup builtin
	SSLRandomSeed connect builtin
</IfModule>

# Header Security
<IfModule headers_module>
	RequestHeader unset Proxy early
</IfModule>

# =================================================
# 4. ACCESS CONTROL AND DIRECTORY PERMISSIONS
# =================================================

# Default: Deny access to the entire file system
<Directory />
	AllowOverride none
	Require all denied
</Directory>

# Protect .htaccess and .htpasswd files
<Files ".ht*">
	Require all denied
</Files>

# Main Document Root permissions
<Directory @DOCUMENT-ROOT-1@>
	Options Indexes FollowSymLinks
	AllowOverride All
	Require all granted
</Directory>

# =================================================
# 5. VIRTUAL HOSTS (Specific Site Configurations)
# =================================================

<VirtualHost *:@VIRTUAL-HOST-PORT@>
	# HTTPS is handled by the global DocumentRoot unless redefined here
	SSLEngine on
	SSLCertificateFile @SSL-CERTIFICATE-FILE@
	SSLCertificateKeyFile @SSL-CERTIFICATE-KEY-FILE@

	# Proxy directives must be placed before the /! alias to take precedence
	ProxyPreserveHost On
	ProxyPass /!/ai/ http://localhost:@LLAMACPP-PORT@/
	ProxyPassReverse /!/ai/ http://localhost:@LLAMACPP-PORT@/
	
	# Alias for additional document roots
	Alias /! @DOCUMENT-ROOT-2@
	<Directory @DOCUMENT-ROOT-2@>
		Options Indexes FollowSymLinks
		AllowOverride All
		Require all granted
	</Directory>
</VirtualHost>

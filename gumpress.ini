[platform]
gumproxy_port = auto   ; values: auto | <number> | 0 (where 0 defaults to port 8443)
mariadb_port  = auto   ; values: auto | <number> | 0 (where 0 defaults to port 3306)
xdebug_port   = auto   ; values: auto | <number> | 0 (where 0 defaults to port 9003)

[autospin]
view = true            ; values: true | false (Browse WordPress Site Dashboard)
code = false           ; values: true | false (Open VSCodium Workspace)